<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞彩足球预测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; padding: 15px; }
        h1 { text-align: center; color: #00d9ff; margin-bottom: 20px; }
        .info { text-align: center; color: #888; margin-bottom: 20px; font-size: 14px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; background: #2d2d44; border: none; color: #fff; cursor: pointer; border-radius: 8px; }
        .tab.active { background: #00d9ff; color: #1a1a2e; }
        .card { background: #2d2d44; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .match-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .match-id { color: #00d9ff; font-weight: bold; }
        .match-league { background: #3d3d5c; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .match-teams { font-size: 18px; font-weight: bold; margin: 10px 0; }
        .match-time { color: #888; font-size: 14px; }
        .pred-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .pred { background: #3d3d5c; padding: 10px; border-radius: 8px; }
        .pred.main { border-left: 3px solid #00ff88; }
        .pred.sub { border-left: 3px solid #ffaa00; }
        .pred-title { font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .pred-option { font-size: 18px; font-weight: bold; }
        .pred-info { font-size: 13px; color: #aaa; margin-top: 5px; }
        .amount { background: #00d9ff; color: #1a1a2e; padding: 2px 8px; border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 5px; }
        .high { color: #00ff88; }
        .medium { color: #ffaa00; }
        .parlay-card { background: #2d2d44; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #00ff88; }
        .parlay-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .parlay-matches { margin: 10px 0; font-size: 14px; line-height: 1.8; }
        .parlay-stats { display: flex; gap: 15px; flex-wrap: wrap; }
        .loading { text-align: center; padding: 50px; }
        @media (max-width: 600px) { .pred-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>⚽ 竞彩足球预测</h1>
    <div class="info" id="info">加载中...</div>
    <div class="tabs">
        <button class="tab active" onclick="show('today')">今日预测</button>
        <button class="tab" onclick="show('tomorrow')">明日预测</button>
        <button class="tab" onclick="show('parlay')">串关推荐</button>
    </div>
    <div id="content"><div class="loading">数据加载中...</div></div>

    <script>
        let data = null;
        fetch('./predictions.json')
            .then(r => r.json())
            .then(json => {
                data = json;
                const info = `更新: ${json.updated_at || ''} | 来源: ${json.update_source || ''}`;
                document.getElementById('info').textContent = info;
                show('today');
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<div class="loading" style="color:#ff6b6b">数据加载失败: ' + err.message + '</div>';
            });

        function show(type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (!data) return;

            let html = '';
            if (type === 'today' || type === 'tomorrow') {
                const d = data[type];
                if (!d || !d.matches || d.matches.length === 0) {
                    html = '<div class="loading">暂无数据</div>';
                } else {
                    html = `<div class="info">比赛: ${d.match_count || d.matches.length} 场</div>`;
                    d.matches.forEach(m => {
                        const p = m.predictions || {};
                        const main = p.main || {};
                        const sub = p.sub || {};
                        html += `
                            <div class="card">
                                <div class="match-header">
                                    <span class="match-id">${m.match_num || m.match_id}</span>
                                    <span class="match-league">${m.league?.short_name || m.league?.name || ''}</span>
                                </div>
                                <div class="match-teams">${m.home_team?.name || m.home_team} VS ${m.away_team?.name || m.away_team}</div>
                                <div class="match-time">${m.datetime || m.match_time || ''}</div>
                                <div class="pred-grid">
                                    ${renderPred('主推', main, 'main')}
                                    ${renderPred('次推', sub, 'sub')}
                                </div>
                            </div>`;
                    });
                }
            } else if (type === 'parlay') {
                if (data.parlay && data.parlay.length > 0) {
                    data.parlay.forEach(p => {
                        const matches = Array.isArray(p.matches) ? p.matches.join('<br>') : '';
                        html += `
                            <div class="parlay-card">
                                <div class="parlay-title">${p.type}</div>
                                <div class="parlay-matches">${matches}</div>
                                <div class="parlay-stats">
                                    <span>赔率: <span style="color:#00d9ff">${p.total_odds || p.odds}</span></span>
                                    <span>信心: <span style="color:#00ff88">${p.confidence}</span></span>
                                    <span class="amount">${p.amount}元</span>
                                </div>
                            </div>`;
                    });
                } else {
                    html = '<div class="loading">暂无串关推荐</div>';
                }
            }
            document.getElementById('content').innerHTML = html;
        }

        function renderPred(title, p, cls) {
            if (!p || !p.selection && !p.option) return '<div class="pred ' + cls + '"><div class="pred-title">' + title + '</div>暂无</div>';
            const sel = p.selection || p.option;
            const odds = p.odds || '';
            const conf = p.confidence || '';
            const amt = p.amount || 0;
            const confClass = conf === '极高' || conf === '高' ? 'high' : conf === '中' ? 'medium' : '';
            return `
                <div class="pred ${cls}">
                    <div class="pred-title">${title}</div>
                    <div class="pred-option">${sel}</div>
                    <div class="pred-info">赔率: ${odds}</div>
                    <div class="pred-info">信心: <span class="${confClass}">${conf}</span></div>
                    <span class="amount">${amt}元</span>
                </div>`;
        }
    </script>
</body>
</html>
